<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uncle Peter's Pancakes Chatbot</title>
  <link rel="stylesheet" href="style.css">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome for WhatsApp Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Center the physical phone frame on the screen for customer-only page */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
      padding: 16px;
    }
    .phone-mockup {
      height: 700px;
      max-width: 400px;
      width: 100%;
      border: 12px solid #27272a;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
    }
  </style>
</head>
<body>

  <!-- Single centered physical phone frame mockup -->
  <div class="phone-mockup">
    <div class="phone-speaker"></div>
    <div class="phone-screen">
      
      <!-- WhatsApp Header -->
      <div class="wa-header">
        <div class="wa-left">
          <i class="fa-solid fa-arrow-left wa-back"></i>
          <div class="wa-avatar-container">
            <div class="wa-avatar">🥞</div>
            <span class="wa-status-dot"></span>
          </div>
          <div class="wa-chat-info">
            <span class="wa-name">Uncle Peter's Pancakes</span>
            <span class="wa-status">Online</span>
          </div>
        </div>
        <div class="wa-actions">
          <i class="fa-solid fa-video"></i>
          <i class="fa-solid fa-phone"></i>
          <i class="fa-solid fa-ellipsis-vertical"></i>
        </div>
      </div>

      <!-- WhatsApp Chat Body -->
      <div class="wa-chat-body" id="chatBody">
        <div class="wa-system-date">TODAY</div>
        
        <div class="wa-message wa-incoming">
          <div class="wa-message-text">
            Hello! Welcome to <b>Uncle Peter's Pancakes</b> Ludhiana. 🥞✨ How can I help you today?
            <br><br>
            You can ask me about our pancake menu, prices, opening hours, or address!
          </div>
          <div class="wa-message-time">12:00 PM <span class="wa-ticks">✓✓</span></div>
        </div>

        <!-- Bouncing typing indicator bubble (hidden by default) -->
        <div class="wa-message wa-incoming typing-indicator-bubble" id="typingBubble" style="display: none;">
          <div class="typing-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>

      <!-- WhatsApp Footer Input -->
      <div class="wa-footer">
        <div class="wa-input-container">
          <i class="fa-regular fa-face-smile wa-icon"></i>
          <input type="text" id="userInput" placeholder="Type a message" autocomplete="off">
          <i class="fa-solid fa-paperclip wa-icon wa-attachment"></i>
          <i class="fa-solid fa-camera wa-icon"></i>
        </div>
        <button class="wa-send-btn" id="sendBtn">
          <i class="fa-solid fa-microphone" id="sendIcon"></i>
        </button>
      </div>

    </div>
  </div>

  <script src="customer.js"></script>
</body>
</html>
